version: 1
project: cli-workspace
root: .
display:
  dashboard: true
agents:
  claude:
    command: claude
    resume_mode: flag
    resume_template: '-r {session_id}'
    create_mode: generated_uuid
    create_template: claude --session-id {session_id}
    label_template: '{project}/{slot}/{window}'
  codex:
    command: codex
    resume_mode: flag
    resume_template: resume {session_id}
    label_template: '{project}/{slot}/{window}'
  gemini:
    command: gemini
    resume_mode: flag
    resume_template: '--session {session_id}'
    label_template: '{project}/{slot}/{window}'
  cursor:
    command: cursor
    resume_mode: flag
    resume_template: '--resume {session_id}'
    label_template: '{project}/{slot}/{window}'
  kimi:
    command: kimi
    resume_mode: flag
    resume_template: '--session-id {session_id}'
    label_template: '{project}/{slot}/{window}'
slots:
  - name: dev
    runtime: tmux
    cwd: .
    windows:
      - name: shell
        agent: codex
        command: zsh
      - name: window-2
        agent: claude
  - name: scratch
    runtime: terminal
    cwd: .
    command: zsh
    title: hi
    agent: codex
