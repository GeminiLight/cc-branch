version: 2
project: browser-drag-project
root: .
tabs:
  - name: shell
    command: zsh
  - name: dev
    panes:
      - name: ui
        command: npm run dev
      - name: spec
        command: npm test
  - name: review
    layoutBackend: tmux
    panes:
      - name: audit
        command: npm run lint
      - name: docs
        command: npm run docs
