# Agent definitions for cc-branch.
#
# Each entry defines the CLI tool, its resume/create behaviour, and the
# template strings used by the planner to build launch commands.
#
# Templates support simple variable substitution with {key} syntax:
#   {session_id}  — resolved session ID from state
#   {project}     — workspace project name
#   {slot}        — slot name
#   {window}      — window name
#   {label}       — resolved label
#
# resume_mode controls which adapter is used:
#   "flag"     → _FlagResumeAdapter    (resume via CLI flag, e.g. "codex resume {session_id}")
#   "internal" → _InternalResumeAdapter(resume via post-launch command)
#   "none"     → _NoneAdapter          (no resume, just run the command)

agents:
  claude:
    command: claude
    install_hint: "Install Claude Code: https://docs.anthropic.com/claude/docs/claude-code"
    resume_mode: flag
    create_mode: generated_uuid
    create_template: "claude --session-id {session_id}"
    resume_template: "-r {session_id}"
    label_template: "{project}/{slot}/{window}"

  codex:
    command: codex
    install_hint: "Install Codex: npm install -g @openai/codex-cli"
    resume_mode: flag
    resume_template: "resume {session_id}"
    label_template: "{project}/{slot}/{window}"

  gemini:
    command: gemini
    install_hint: "Install Gemini CLI: pip install google-generativeai-cli"
    resume_mode: flag
    resume_template: "--session {session_id}"
    label_template: "{project}/{slot}/{window}"

  cursor:
    command: cursor
    install_hint: "Install Cursor CLI: https://cursor.sh/cli"
    resume_mode: flag
    resume_template: "--resume {session_id}"
    label_template: "{project}/{slot}/{window}"

  kimi:
    command: kimi
    install_hint: "Install Kimi CLI: pip install kimi-cli"
    resume_mode: flag
    resume_template: "--session-id {session_id}"
    label_template: "{project}/{slot}/{window}"
