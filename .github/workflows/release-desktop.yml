name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            args: --target aarch64-apple-darwin --bundles app
            rust-targets: aarch64-apple-darwin
            sidecar-target: aarch64-apple-darwin
          - name: macOS Intel
            os: macos-15-intel
            args: --target x86_64-apple-darwin --bundles app
            rust-targets: x86_64-apple-darwin
            sidecar-target: x86_64-apple-darwin
          - name: Linux
            os: ubuntu-22.04
            args: ""
            rust-targets: ""
            sidecar-target: x86_64-unknown-linux-gnu
          - name: Windows
            os: windows-latest
            args: ""
            rust-targets: ""
            sidecar-target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: apps/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install app dependencies
        working-directory: apps
        run: npm ci

      - name: Build bundled backend sidecar
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[desktop]"
          python scripts/build-desktop-sidecar.py --target ${{ matrix.sidecar-target }}

      - name: Build desktop app and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ inputs.release_tag || github.ref_name }}
          releaseName: CC Branch Desktop ${{ inputs.release_tag || github.ref_name }}
          releaseBody: |
            # CC Branch Desktop

            This desktop build bundles the CC Branch backend sidecar. You do not need
            to install Python or the `cc-branch` Python package separately.

            ## Which file should I download?

            | Platform | Recommended download | Notes |
            | --- | --- | --- |
            | macOS Apple Silicon | `cc-branch_aarch64.app.tar.gz` | For M1/M2/M3/M4 Macs. Extract the archive, then open the app. |
            | macOS Intel | `cc-branch_x64.app.tar.gz` | For older Intel Macs. Extract the archive, then open the app. |
            | Windows | `cc-branch_0.1.0_x64_en-US.msi` | Standard Windows installer. Use the `.exe` setup file only if you prefer an executable installer. |
            | Ubuntu / Debian | `cc-branch_0.1.0_amd64.deb` | Best choice for Debian-based Linux distributions. |
            | Fedora / RHEL | `cc-branch-0.1.0-1.x86_64.rpm` | Best choice for RPM-based Linux distributions. |
            | Other Linux | `cc-branch_0.1.0_amd64.AppImage` | Portable Linux build. Larger because it bundles more runtime dependencies. |

            ## CLI package

            The CLI package is published separately through the Python package flow:

            ```bash
            pipx install cc-branch
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
