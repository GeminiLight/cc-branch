version: 1
project: cli-workspace
root: .
display:
  mode: grid
  columns: 2
  dashboard: true
agents:
  claude:
    command: claude
    resume_mode: flag
    resume_template: '-r {session_id}'
    create_mode: generated_uuid
    create_template: claude --session-id {session_id}
    label_template: '{project}/{slot}/{window}'
  codex:
    command: codex
    resume_mode: flag
    resume_template: resume {session_id}
    label_template: '{project}/{slot}/{window}'
  gemini:
    command: gemini
    resume_mode: flag
    resume_template: '--session {session_id}'
    label_template: '{project}/{slot}/{window}'
  cursor:
    command: cursor
    resume_mode: flag
    resume_template: '--resume {session_id}'
    label_template: '{project}/{slot}/{window}'
  kimi:
    command: kimi
    resume_mode: flag
    resume_template: '--session-id {session_id}'
    label_template: '{project}/{slot}/{window}'
slots:
  - name: codex-ui
    runtime: terminal
    cwd: .
    title: UI polish
    agent: codex
    session_id: 019e0be6-9369-7af1-ac0e-0a9868a309c4
  - name: codex-spec
    runtime: terminal
    cwd: .
    title: Product spec
    agent: codex
    session_id: 019dd56d-0700-7bb3-a9c0-83eb2b033b0e
  - name: tmux-dev
    runtime: tmux
    cwd: .
    windows:
      - name: planner
        agent: codex
        command: codex
      - name: shell
        command: zsh
