version: 2
project: cli-workspace
root: .
display:
  dashboard: true
agents:
  claude:
    command: claude
    resume_mode: flag
    resume_template: '-r {session_id}'
    create_mode: generated_uuid
    create_template: claude --session-id {session_id}
    label_template: '{project}/{slot}/{window}'
  codex:
    command: codex
    resume_mode: flag
    resume_template: resume {session_id}
    label_template: '{project}/{slot}/{window}'
  gemini:
    command: gemini
    resume_mode: flag
    resume_template: '--session {session_id}'
    label_template: '{project}/{slot}/{window}'
  cursor:
    command: cursor
    resume_mode: flag
    resume_template: '--resume {session_id}'
    label_template: '{project}/{slot}/{window}'
  kimi:
    command: kimi
    resume_mode: flag
    resume_template: '--session-id {session_id}'
    label_template: '{project}/{slot}/{window}'
tabs:
  - name: codex-spec
    cwd: .
    panes:
      - name: Product spec
        agent: codex
        cwd: .
        session_id: 019dd56d-0700-7bb3-a9c0-83eb2b033b0e
      - name: pane-2
        agent: claude
  - name: tmux-dev
    cwd: .
    panes:
      - name: tmux-dev
        runtime: tmux
        windows:
          - name: shell
            command: zsh
