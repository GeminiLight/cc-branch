# Human-friendly YAML variant of the starter workspace config.
# Keep template strings quoted so braces stay unambiguous across editors.

version: 1
project: "your-project"
root: "."

display:
  mode: "grid"
  columns: 2
  dashboard: true

agents:
  codex:
    command: "codex"
    resume_mode: "flag"
    resume_template: "resume {session_id}"
    label_template: "{project}/{slot}/{window}"

  claude:
    command: "claude"
    create_mode: "generated_uuid"
    create_template: "claude --session-id {session_id}"
    resume_mode: "flag"
    resume_template: "-r {session_id}"
    label_template: "{project}/{slot}/{window}"

slots:
  - name: "dev"
    runtime: "tmux"
    cwd: "."
    windows:
      - name: "planner"
        agent: "codex"
      - name: "review"
        agent: "claude"

  - name: "scratch"
    runtime: "terminal"
    cwd: "."
    command: "zsh"
